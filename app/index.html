<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PicPulse Web - Image Analyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.21.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root {
      --bg: #1a0f0a;
      --bg2: #241510;
      --bg-card: #2a1a12;
      --bg-card-hover: #3a2a1a;
      --text: #f5f0e8;
      --text-secondary: #b8a898;
      --text-muted: #8a7a6a;
      --border: #3a2a1a;
      --border-hover: #c9950eaa;
      --accent: #c9950e;
      --accent2: #e8b830;
      --accent-grad: linear-gradient(135deg, #c9950e, #e8b830, #f5d060);
      --btn-primary-bg: linear-gradient(135deg, #c9950e, #e8b830);
      --btn-primary-color: #1a0f0a;
      --btn-secondary-bg: #2a1a12;
      --btn-secondary-border: #3a2a1a;
      --btn-secondary-hover: #c9950e;
      --danger: #dc2626;
      --success: #4ade80;
      --tag-flare-bg: #4a2a0a33;
      --tag-flare-color: #e8b830;
      --tag-flare-border: #4a2a0a55;
      --tag-ocr-bg: #0a1a2a33;
      --tag-ocr-color: #60a5fa;
      --tag-ocr-border: #0a1a2a55;
      --tag-ai-bg: #2a1a4a33;
      --tag-ai-color: #a78bfa;
      --tag-ai-border: #2a1a4a55;
      --progress-bg: #2a1a12;
      --progress-fill: linear-gradient(90deg, #c9950e, #e8b830);
      --rename-bg: #0d0805;
      --rename-border: #3a2a1a;
      --rename-color: #e8b830;
      --rename-focus: #c9950e;
      --stat-total: #f5f0e8;
      --stat-renamed: #4ade80;
      --stat-flare: #e8b830;
      --stat-errors: #f87171;
      --summary-bg: #241510;
      --summary-border: #3a2a1a;
      --options-bg: #241510;
      --options-border: #3a2a1a;
      --link-color: #e8b830;
      --loader-border: #3a2a1a;
      --loader-accent: #e8b830;
      --placeholder: #b8a898;
    }
    [data-theme="light"] {
      --bg: #f5eed6;
      --bg2: #f0e8d0;
      --bg-card: #ffffff;
      --bg-card-hover: #f8f0e0;
      --text: #3a2a1a;
      --text-secondary: #7a6a5a;
      --text-muted: #9a8a7a;
      --border: #d4c4a8;
      --border-hover: #b8860baa;
      --accent: #b8860b;
      --accent2: #8b4513;
      --accent-grad: linear-gradient(135deg, #b8860b, #8b4513, #d4a017);
      --btn-primary-bg: linear-gradient(135deg, #b8860b, #d4a017);
      --btn-primary-color: #ffffff;
      --btn-secondary-bg: #ffffff;
      --btn-secondary-border: #d4c4a8;
      --btn-secondary-hover: #b8860b;
      --danger: #dc2626;
      --success: #16a34a;
      --tag-flare-bg: #f0d8b833;
      --tag-flare-color: #b8860b;
      --tag-flare-border: #d4a01755;
      --tag-ocr-bg: #d0e0f833;
      --tag-ocr-color: #2563eb;
      --tag-ocr-border: #2563eb55;
      --tag-ai-bg: #d8c8f033;
      --tag-ai-color: #7c3aed;
      --tag-ai-border: #7c3aed55;
      --progress-bg: #d4c4a8;
      --progress-fill: linear-gradient(90deg, #b8860b, #d4a017);
      --rename-bg: #f5eed6;
      --rename-border: #d4c4a8;
      --rename-color: #8b4513;
      --rename-focus: #b8860b;
      --stat-total: #3a2a1a;
      --stat-renamed: #16a34a;
      --stat-flare: #b8860b;
      --stat-errors: #dc2626;
      --summary-bg: #ffffff;
      --summary-border: #d4c4a8;
      --options-bg: #ffffff;
      --options-border: #d4c4a8;
      --link-color: #8b4513;
      --loader-border: #d4c4a8;
      --loader-accent: #b8860b;
      --placeholder: #7a6a5a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; transition: background 0.3s, color 0.3s; }
    .container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
    header { text-align: center; padding: 2rem 0 1.5rem; }
    .header-top { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 0.5rem; }
    .theme-toggle { background: none; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 1.2rem; padding: 0.3rem 0.6rem; transition: border-color 0.2s; line-height: 1; }
    .theme-toggle:hover { border-color: var(--accent); }
    .logo { font-size: 2rem; font-weight: 800; background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.03em; }
    .tagline { color: var(--text-secondary); font-size: 0.95rem; }
    .status-bar { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; }
    .badge { background: var(--bg-card); color: var(--accent); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--border); }
    .badge.ready { border-color: #22c55e55; color: var(--success); }
    .badge.error { border-color: #ef444455; color: var(--danger); }
    .drop-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 2.5rem 1rem; text-align: center; cursor: pointer; transition: all 0.2s; margin: 1rem 0; }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: var(--bg-card); }
    .drop-zone.has-images { border-style: solid; border-color: var(--success); padding: 1rem; }
    .drop-zone-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .drop-zone-text { color: var(--text-secondary); font-size: 0.9rem; }
    .options { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: center; margin: 1rem 0; padding: 1rem; background: var(--options-bg); border-radius: 10px; border: 1px solid var(--options-border); transition: background 0.3s, border-color 0.3s; }
    .options label { display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); font-size: 0.9rem; cursor: pointer; }
    .options input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; }
    .options input[type="range"] { accent-color: var(--accent); width: 100px; }
    .options .range-label { color: var(--text-muted); font-size: 0.8rem; min-width: 2.5rem; text-align: right; }
    .btn { padding: 0.6rem 1.5rem; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--btn-primary-bg); color: var(--btn-primary-color); }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 15px var(--accent); }
    .btn-secondary { background: var(--btn-secondary-bg); color: var(--text); border: 1px solid var(--btn-secondary-border); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--btn-secondary-hover); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover:not(:disabled) { opacity: 0.9; }
    .actions { display: flex; gap: 0.75rem; justify-content: center; margin: 1rem 0; flex-wrap: wrap; }
    .progress-section { margin: 1rem 0; display: none; }
    .progress-section.active { display: block; }
    .progress-bar { height: 6px; background: var(--progress-bg); border-radius: 3px; overflow: hidden; margin: 0.5rem 0; }
    .progress-bar-fill { height: 100%; background: var(--progress-fill); border-radius: 3px; width: 0%; transition: width 0.3s; }
    .progress-text { color: var(--text-secondary); font-size: 0.85rem; text-align: center; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin: 1rem 0; }
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
    .card:hover { border-color: var(--border-hover); }
    .card-img { width: 100%; height: 160px; object-fit: cover; display: block; background: var(--bg2); }
    .card-body { padding: 0.6rem; }
    .card-title { font-size: 0.85rem; font-weight: 600; color: var(--text); word-break: break-all; }
    .card-subtitle { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.2rem; }
    .card-tag { display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 10px; margin-top: 0.3rem; }
    .tag-flare { background: var(--tag-flare-bg); color: var(--tag-flare-color); border: 1px solid var(--tag-flare-border); }
    .tag-ocr { background: var(--tag-ocr-bg); color: var(--tag-ocr-color); border: 1px solid var(--tag-ocr-border); }
    .tag-ai { background: var(--tag-ai-bg); color: var(--tag-ai-color); border: 1px solid var(--tag-ai-border); }
    .rename-row { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.4rem; flex-wrap: wrap; }
    .rename-input { background: var(--rename-bg); border: 1px solid var(--rename-border); border-radius: 4px; color: var(--rename-color); font-size: 0.8rem; padding: 0.2rem 0.4rem; flex: 1; min-width: 80px; transition: border-color 0.2s; }
    .rename-input:focus { outline: none; border-color: var(--rename-focus); }
    .card-new-name { font-size: 0.8rem; color: var(--success); word-break: break-all; }
    .card-old-name { font-size: 0.7rem; color: var(--danger); text-decoration: line-through; word-break: break-all; }
    .card-arrow { color: var(--text-muted); font-size: 0.75rem; }
    .summary { background: var(--summary-bg); border: 1px solid var(--summary-border); border-radius: 10px; padding: 1rem; margin: 1rem 0; display: none; transition: background 0.3s; }
    .summary.active { display: block; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.75rem; margin-top: 0.75rem; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); }
    .stat-total .stat-value { color: var(--stat-total); }
    .stat-renamed .stat-value { color: var(--stat-renamed); }
    .stat-flare .stat-value { color: var(--stat-flare); }
    .stat-errors .stat-value { color: var(--stat-errors); }
    .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--loader-border); border-top-color: var(--loader-accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 0.3rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
    .back-link { display: inline-block; color: var(--link-color); text-decoration: none; font-size: 0.85rem; margin-bottom: 0.5rem; }
    .back-link:hover { text-decoration: underline; }
    .preview-row { display: flex; gap: 1rem; align-items: flex-start; margin: 0.5rem 0; padding: 0.5rem; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); }
    .preview-row img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
    .preview-row .info { flex: 1; min-width: 0; }
    .preview-row .info .name { font-size: 0.8rem; color: var(--success); }
    .preview-row .info .detail { font-size: 0.7rem; color: var(--text-muted); }
    @media (max-width: 600px) { .gallery { grid-template-columns: 1fr 1fr; } .card-img { height: 120px; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <a href="/PicPulse" class="back-link" style="margin-bottom:0;">&larr; Back</a>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">&#127769;</button>
      </div>
      <div class="logo">PicPulse Web</div>
      <div class="tagline">AI Image Analyzer — runs entirely in your browser</div>
      <div class="status-bar">
        <span id="modelStatus" class="badge">Model: loading...</span>
        <span id="ocrStatus" class="badge">OCR: loading...</span>
        <span id="totalBadge" class="badge hidden">Images: 0</span>
      </div>
    </header>

    <div id="dropZone" class="drop-zone">
      <div class="drop-zone-icon">&#128247;</div>
      <div class="drop-zone-text"><strong>Drop images here</strong> or click to browse</div>
      <div style="color:#555;font-size:0.8rem;margin-top:0.3rem;">JPEG, PNG, GIF, BMP, WEBP</div>
    </div>

    <div class="options">
      <label><input type="checkbox" id="optFlareTag" checked> Add flare_ tag</label>
      <label><input type="checkbox" id="optOcr" checked> OCR (text detection)</label>
      <label style="flex:1;min-width:120px;">
        <span style="color:#888;font-size:0.8rem;">Flare threshold</span>
        <input type="range" id="flareThreshold" min="0.1" max="0.9" step="0.05" value="0.3">
        <span class="range-label" id="flareThresholdLabel">0.30</span>
      </label>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="btnProcess" disabled>Process Images</button>
      <button class="btn btn-secondary" id="btnClear">Clear All</button>
    </div>

    <div class="progress-section" id="progressSection">
      <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Ready</div>
    </div>

    <div class="summary" id="summary">
      <h3 style="font-size:1rem;color:#f0f0f0;">Results</h3>
      <div class="summary-grid">
        <div class="stat stat-total"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total</div></div>
        <div class="stat stat-renamed"><div class="stat-value" id="statRenamed">0</div><div class="stat-label">Renamed</div></div>
        <div class="stat stat-flare"><div class="stat-value" id="statFlare">0</div><div class="stat-label">Flare</div></div>
        <div class="stat stat-errors"><div class="stat-value" id="statErrors">0</div><div class="stat-label">Errors</div></div>
      </div>
      <div class="actions" id="resultActions" style="display:none;margin-top:0.75rem;">
        <button class="btn btn-primary" id="btnApplyRenames">Apply Edits</button>
        <button class="btn btn-secondary" id="btnDownloadZip">Download ZIP</button>
        <button class="btn btn-secondary" id="btnDownloadCsv">Download CSV</button>
      </div>
      <div style="margin-top:0.5rem;font-size:0.8rem;color:#888;" id="summaryNote"></div>
    </div>

    <div id="gallery" class="gallery"></div>

    <footer style="text-align:center;padding:2rem 0;color:#555;font-size:0.8rem;border-top:1px solid #222;margin-top:2rem;">
      Powered by TensorFlow.js, Tesseract.js &middot; <a href="https://github.com/ucfzem/PicPulse" style="color:#a855f7;text-decoration:none;">GitHub</a>
    </footer>
  </div>

  <input type="file" id="fileInput" accept="image/*" multiple hidden>

  <script>
    (function() {
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      const gallery = document.getElementById('gallery');
      const btnProcess = document.getElementById('btnProcess');
      const btnClear = document.getElementById('btnClear');
      const progressSection = document.getElementById('progressSection');
      const progressFill = document.getElementById('progressFill');
      const progressText = document.getElementById('progressText');
      const summary = document.getElementById('summary');
      const modelStatus = document.getElementById('modelStatus');
      const ocrStatus = document.getElementById('ocrStatus');
      const totalBadge = document.getElementById('totalBadge');
      const optFlareTag = document.getElementById('optFlareTag');
      const optOcr = document.getElementById('optOcr');
      const flareThreshold = document.getElementById('flareThreshold');
      const flareThresholdLabel = document.getElementById('flareThresholdLabel');
      const statTotal = document.getElementById('statTotal');
      const statRenamed = document.getElementById('statRenamed');
      const statFlare = document.getElementById('statFlare');
      const statErrors = document.getElementById('statErrors');
      const summaryNote = document.getElementById('summaryNote');

      let images = [];
      let model = null;
      let ocrWorker = null;
      let modelLoaded = false;
      let ocrLoaded = false;
      let isProcessing = false;
      let isDark = localStorage.getItem('picpulse-theme') !== 'light';
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      document.getElementById('themeToggle').textContent = isDark ? '\u{1F319}' : '\u{2600}\u{FE0F}';

      document.getElementById('themeToggle').addEventListener('click', () => {
        isDark = !isDark;
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        localStorage.setItem('picpulse-theme', isDark ? 'dark' : 'light');
        document.getElementById('themeToggle').textContent = isDark ? '\u{1F319}' : '\u{2600}\u{FE0F}';
      });

      flareThreshold.addEventListener('input', () => {
        flareThresholdLabel.textContent = parseFloat(flareThreshold.value).toFixed(2);
      });

      dropZone.addEventListener('click', () => fileInput.click());
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
      fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFiles(fileInput.files); });

      function handleFiles(files) {
        if (isProcessing) return;
        const valid = [];
        for (const f of files) {
          if (f.type.startsWith('image/')) valid.push(f);
        }
        if (!valid.length) return;
        for (const f of valid) {
          const reader = new FileReader();
          reader.onload = (e) => {
            images.push({ file: f, url: e.target.result, results: null });
            updateGallery();
          };
          reader.readAsDataURL(f);
        }
      }

      function updateGallery() {
        gallery.innerHTML = '';
        if (images.length === 0) {
          dropZone.classList.remove('has-images');
          dropZone.querySelector('.drop-zone-icon').innerHTML = '&#128247;';
          dropZone.querySelector('.drop-zone-text').innerHTML = '<strong>Drop images here</strong> or click to browse';
          totalBadge.classList.add('hidden');
          btnProcess.disabled = true;
          return;
        }
        dropZone.classList.add('has-images');
        dropZone.querySelector('.drop-zone-icon').innerHTML = `&#128193; ${images.length} images`;
        dropZone.querySelector('.drop-zone-text').innerHTML = 'Click to add more images';
        totalBadge.classList.remove('hidden');
        totalBadge.textContent = `Images: ${images.length}`;
        btnProcess.disabled = !modelLoaded || !ocrLoaded;

        for (let i = 0; i < images.length; i++) {
          const img = images[i];
          const card = document.createElement('div');
          card.className = 'card';
          card.id = `card-${i}`;
          card.innerHTML = `
            <img class="card-img" src="${img.url}" alt="${img.file.name}">
            <div class="card-body">
              <div class="card-title">${escapeHtml(img.file.name)}</div>
              <div class="card-subtitle" id="sub-${i}">${img.results ? formatResultLine(img.results) : 'Waiting...'}</div>
            </div>
          `;
          gallery.appendChild(card);
        }
      }

      function formatResultLine(r) {
        const parts = [];
        if (r.keyword) parts.push(`<span class="tag-flare tag-ai">${r.keyword}</span>`);
        if (r.confidence) parts.push(`<span style="color:#888;font-size:0.7rem;">${(r.confidence*100).toFixed(1)}%</span>`);
        if (r.hasFlare) parts.push(`<span class="tag-flare">FLARE ${(r.flareScore*100).toFixed(0)}%</span>`);
        if (r.detectedText) parts.push(`<span class="tag-ocr">OCR</span>`);
        if (r.error) parts.push(`<span class="tag-flare tag-ocr" style="color:#f87171;">Error</span>`);
        if (r.newName) parts.push(`<div class="card-new-name">${escapeHtml(r.newName)}</div>`);
        if (r.newName && r.originalName !== r.newName) parts.push(`<div class="card-old-name">${escapeHtml(r.originalName)}</div>`);
        return parts.join(' ');
      }

      function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

      // Load MobileNet
      async function loadModel() {
        try {
          modelStatus.textContent = 'Model: loading...';
          modelStatus.className = 'badge';
          model = await mobilenet.load({ version: 2, alpha: 1 });
          modelLoaded = true;
          modelStatus.textContent = 'Model: ready';
          modelStatus.className = 'badge ready';
          btnProcess.disabled = !modelLoaded || !ocrLoaded || images.length === 0;
        } catch (e) {
          modelStatus.textContent = 'Model: failed to load';
          modelStatus.className = 'badge error';
          console.error(e);
        }
      }

      // Load Tesseract
      async function loadOcr() {
        try {
          ocrStatus.textContent = 'OCR: loading...';
          ocrStatus.className = 'badge';
          ocrWorker = await Tesseract.createWorker(['eng', 'ara']);
          ocrLoaded = true;
          ocrStatus.textContent = 'OCR: ready';
          ocrStatus.className = 'badge ready';
          btnProcess.disabled = !modelLoaded || !ocrLoaded || images.length === 0;
        } catch (e) {
          ocrStatus.textContent = 'OCR: failed to load';
          ocrStatus.className = 'badge error';
          console.error(e);
        }
      }

      // Flare detection (browser port of the Python/Android algorithm)
      function detectFlare(imgData, width, height, threshold) {
        const data = imgData.data;
        const totalPixels = width * height;
        const hue = new Float32Array(totalPixels);
        const value = new Float32Array(totalPixels);
        const brightMask = new Uint8Array(totalPixels);

        for (let i = 0; i < totalPixels; i++) {
          const idx = i * 4;
          const r = data[idx] / 255;
          const g = data[idx + 1] / 255;
          const b = data[idx + 2] / 255;

          const cmax = Math.max(r, g, b);
          const cmin = Math.min(r, g, b);
          const delta = cmax - cmin;

          let h = 0;
          if (delta !== 0) {
            if (cmax === r) h = 60 * (((g - b) / delta) % 6);
            else if (cmax === g) h = 60 * (((b - r) / delta) + 2);
            else h = 60 * (((r - g) / delta) + 4);
          }
          if (h < 0) h += 360;
          hue[i] = h;
          value[i] = cmax * 255;
          brightMask[i] = value[i] > 240 ? 1 : 0;
        }

        const brightCount = brightMask.reduce((a, b) => a + b, 0);
        const brightRatio = brightCount / totalPixels;

        const minRegionArea = Math.max(30, totalPixels * 0.0005);
        const largeRegionArea = Math.max(300, totalPixels * 0.003);

        const visited = new Uint8Array(totalPixels);
        const regions = [];

        function floodFill(start) {
          const stack = [start];
          let count = 0;
          let totalHue = 0;
          let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
          while (stack.length) {
            const idx = stack.pop();
            if (idx < 0 || idx >= totalPixels || visited[idx] || !brightMask[idx]) continue;
            visited[idx] = 1;
            count++;
            totalHue += hue[idx];
            const x = idx % width;
            const y = Math.floor(idx / width);
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
            if (x > 0) stack.push(idx - 1);
            if (x < width - 1) stack.push(idx + 1);
            if (y > 0) stack.push(idx - width);
            if (y < height - 1) stack.push(idx + width);
          }
          return { count, totalHue, minX, maxX, minY, maxY };
        }

        for (let i = 0; i < totalPixels; i++) {
          if (!visited[i] && brightMask[i]) {
            const { count, totalHue, minX, maxX, minY, maxY } = floodFill(i);
            if (count >= minRegionPixels) {
              const meanHue = totalHue / count;
              const isMagenta = meanHue >= 280 && meanHue <= 330;
              const bw = maxX - minX + 1;
              const bh = maxY - minY + 1;
              const bboxArea = bw * bh;
              const fillRatio = bboxArea > 0 ? count / bboxArea : 0;
              const aspectRatio = Math.max(bw, bh) / Math.max(1, Math.min(bw, bh));
              const isCircularBlob = fillRatio > 0.55 && aspectRatio < 1.8;
              regions.push({ area: count, meanHue, isMagenta, isCircularBlob });
            }
          }
        }

        const circularBlobs = regions.filter(r => r.area > largeRegionPixels && r.isCircularBlob).length;
        const magentaRegions = regions.filter(r => r.isMagenta).length;

        let score = 0;
        if (circularBlobs >= 1) score += 0.3;
        if (circularBlobs >= 2) score += 0.3;
        if (magentaRegions >= 1) score += 0.4;
        score = Math.min(score, 1);

        return { hasFlare: score >= threshold, score, brightRatio, brightRegionCount: circularBlobs };
      }

      // Clean label
      function cleanLabel(label) {
        const first = label.split(',')[0];
        return first.replace(/\(.*?\)/g, '').trim().toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
      }

      function scaleCanvas(sourceCanvas, maxDim) {
        const { width, height } = sourceCanvas;
        if (width <= maxDim && height <= maxDim) return sourceCanvas;
        const scale = maxDim / Math.max(width, height);
        const newW = Math.max(1, Math.round(width * scale));
        const newH = Math.max(1, Math.round(height * scale));
        const c = document.createElement('canvas');
        c.width = newW;
        c.height = newH;
        c.getContext('2d').drawImage(sourceCanvas, 0, 0, newW, newH);
        return c;
      }

      function withTimeout(promise, ms, label) {
        return Promise.race([
          promise,
          new Promise((_, reject) => setTimeout(() => reject(new Error(`${label} timed out after ${ms}ms`)), ms))
        ]);
      }

      async function processOneImage(img, ext, addFlare, useOcr, flareThresh, counters) {
        const bitmap = await createImageBitmap(img.file);
        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(bitmap, 0, 0);
        bitmap.close();

        const flareCanvas = scaleCanvas(canvas, 700);
        const flareCtx = flareCanvas.getContext('2d');
        const fullImgData = flareCtx.getImageData(0, 0, flareCanvas.width, flareCanvas.height);
        const flareResult = detectFlare(fullImgData, flareCanvas.width, flareCanvas.height, flareThresh);
        if (flareCanvas !== canvas) { flareCanvas.width = 0; flareCanvas.height = 0; }

        const smallCanvas = document.createElement('canvas');
        smallCanvas.width = 224;
        smallCanvas.height = 224;
        const smallCtx = smallCanvas.getContext('2d');
        smallCtx.drawImage(canvas, 0, 0, 224, 224);
        const predictions = await model.classify(smallCanvas);
        smallCanvas.width = 0;
        smallCanvas.height = 0;

        const topPred = predictions[0] || { className: 'unknown', probability: 0 };
        const keyword = cleanLabel(topPred.className) || 'unknown';
        const confidence = topPred.probability;

        let detectedText = null;
        let ocrConfidence = 0;
        if (useOcr) {
          try {
            const ocrCanvas = scaleCanvas(canvas, 1200);
            const ocrResult = await ocrWorker.recognize(ocrCanvas);
            if (ocrCanvas !== canvas) { ocrCanvas.width = 0; ocrCanvas.height = 0; }
            const text = ocrResult.data.text.trim();
            ocrConfidence = ocrResult.data.confidence;
            if (text.length > 0) {
              detectedText = text.substring(0, 100);
            }
          } catch (e) { /* OCR failed silently */ }
        }
        canvas.width = 0;
        canvas.height = 0;

        let finalKeyword = keyword;
        const meaningfulText = detectedText ? detectedText.replace(/\s+/g, '') : '';
        if (useOcr && meaningfulText.length >= 8 && ocrConfidence > 60) {
          finalKeyword = 'document';
        }

        const count = (counters[finalKeyword] || 0) + 1;
        counters[finalKeyword] = count;
        let newName = `${finalKeyword}_${String(count).padStart(3, '0')}.${ext}`;
        if (flareResult.hasFlare && addFlare) {
          newName = `flare_${newName}`;
        }

        return {
          originalName: img.file.name,
          newName,
          keyword: finalKeyword,
          confidence,
          hasFlare: flareResult.hasFlare,
          flareScore: flareResult.score,
          detectedText,
          renamed: img.file.name !== newName,
          error: null
        };
      }

      // Process all images
      async function processImages() {
        if (isProcessing || !images.length) return;
        isProcessing = true;
        btnProcess.disabled = true;
        btnClear.disabled = true;
        progressSection.classList.add('active');
        summary.classList.remove('active');
        gallery.innerHTML = '';

        const addFlare = optFlareTag.checked;
        const useOcr = optOcr.checked;
        const flareThresh = parseFloat(flareThreshold.value);
        const counters = {};
        const results = [];
        let total = images.length;
        let renamedCount = 0;
        let flareCount = 0;
        let errorCount = 0;

        for (let i = 0; i < images.length; i++) {
          const img = images[i];
          const ext = img.file.name.split('.').pop().toLowerCase();
          progressFill.style.width = `${((i) / total * 100)}%`;
          progressText.innerHTML = `<span class="loading"></span> Processing ${i + 1}/${total}: ${escapeHtml(img.file.name)}`;

          try {
            const result = await withTimeout(processOneImage(img, ext, addFlare, useOcr, flareThresh, counters), 30000, 'Image processing');
            if (result.renamed) renamedCount++;
            if (result.hasFlare) flareCount++;
            img.results = result;
            results.push(result);
          } catch (e) {
            errorCount++;
            const result = { originalName: img.file.name, newName: null, keyword: 'error', confidence: 0, hasFlare: false, flareScore: 0, detectedText: null, renamed: false, error: e.message };
            img.results = result;
            results.push(result);
          }

          // Add/update card with editable rename input
          const card = document.createElement('div');
          card.className = 'card';
          card.id = `card-${i}`;
          const tags = formatResultLine(img.results);
          const safeNewName = escapeHtml(result.newName || '');
          const safeOrigName = escapeHtml(result.originalName);
          card.innerHTML = `
            <img class="card-img" src="${img.url}" alt="${safeOrigName}">
            <div class="card-body">
              <div class="card-title">${safeOrigName}</div>
              <div class="card-subtitle">${tags}</div>
              <div class="rename-row">
                <span class="card-old-name">${safeOrigName}</span>
                <span class="card-arrow">&rarr;</span>
                <input class="rename-input" value="${safeNewName}" data-idx="${i}">
              </div>
            </div>
          `;
          gallery.appendChild(card);
        }

        progressFill.style.width = '100%';
        progressText.textContent = `Done! ${total} images processed.`;

        storedResults = results;

        // Show summary
        summary.classList.add('active');
        statTotal.textContent = total;
        statRenamed.textContent = renamedCount;
        statFlare.textContent = flareCount;
        statErrors.textContent = errorCount;
        summaryNote.textContent = `Naming scheme: [keyword]_[counter].ext ${addFlare ? '· flare_ prefix when detected' : ''}`;
        document.getElementById('resultActions').style.display = 'flex';

        isProcessing = false;
        btnProcess.disabled = images.length === 0;
        btnClear.disabled = false;
      }

      let storedResults = [];

      function applyRenames() {
        const inputs = document.querySelectorAll('.rename-input');
        for (const inp of inputs) {
          const idx = parseInt(inp.dataset.idx);
          if (!isNaN(idx) && idx < storedResults.length) {
            storedResults[idx].newName = inp.value;
            storedResults[idx].renamed = storedResults[idx].originalName !== inp.value;
          }
        }
        const renamed = storedResults.filter(r => r.renamed).length;
        statRenamed.textContent = renamed;
      }

      function downloadCsv() {
        const addFlare = optFlareTag.checked;
        let csv = 'Original Name,New Name,Keyword,Confidence,Flare,Flare Score,OCR Text\n';
        for (const r of storedResults) {
          csv += `"${r.originalName}","${r.newName || ''}","${r.keyword}",${r.confidence.toFixed(3)},${r.hasFlare},${r.flareScore.toFixed(3)},"${r.detectedText || ''}"\n`;
        }
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'picpulse-results.csv';
        a.click();
        URL.revokeObjectURL(url);
      }

      async function downloadZip() {
        if (typeof JSZip === 'undefined') { alert('JSZip not loaded'); return; }
        const zip = new JSZip();
        const folder = zip.folder('picpulse-renamed');
        for (let i = 0; i < storedResults.length; i++) {
          const r = storedResults[i];
          const img = images[i];
          if (!img || r.error) continue;
          try {
            const response = await fetch(img.url);
            const blob = await response.blob();
            folder.file(r.newName || r.originalName, blob);
          } catch (e) {
            console.warn('Failed to add to zip:', r.originalName, e);
          }
        }
        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(zipBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'picpulse-renamed.zip';
        a.click();
        URL.revokeObjectURL(url);
      }

      btnProcess.addEventListener('click', processImages);

      document.getElementById('btnApplyRenames').addEventListener('click', applyRenames);
      document.getElementById('btnDownloadCsv').addEventListener('click', downloadCsv);
      document.getElementById('btnDownloadZip').addEventListener('click', downloadZip);

      btnClear.addEventListener('click', () => {
        if (isProcessing) return;
        images = [];
        storedResults = [];
        gallery.innerHTML = '';
        summary.classList.remove('active');
        document.getElementById('resultActions').style.display = 'none';
        progressSection.classList.remove('active');
        progressFill.style.width = '0%';
        progressText.textContent = 'Ready';
        updateGallery();
      });

      loadModel();
      loadOcr();
    })();
  </script>
</body>
</html>
